<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <ul id="jokes"></ul>

    <script>
        main()

        async function main() {
            const jokes = await getDih()

            const jokesUL = document.querySelector("#jokes")

            for (const joke of jokes) {
                jokesUL.innerHTML += jokes[5]
                return
            }
        }

       async function getDih() {
          const res = await fetch("jokes.JSON")
          const data = await res.json()
          return data
        }
    </script>
    
</body>
</html>
